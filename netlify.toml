# Netlify Configuration for Trumpet Practice Companion

# Build settings
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Environment variables (add your Supabase keys in Netlify Dashboard)
[build.environment]
  NODE_VERSION = "20"
  VITE_SUPABASE_URL = ""
  VITE_SUPABASE_ANON_KEY = ""

# Redirect all non-file requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for index.html (no cache to always get latest)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
